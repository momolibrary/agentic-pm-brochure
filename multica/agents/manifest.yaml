# multica/agents/manifest.yaml — Agent & Skill 注册表
# multica CLI 通过此文件解析 mention 路由
# 这是 Agent/Skill 注册的单一事实源（Single Source of Truth）
#
# ===== Multica Mention 协议 =====
# multica 使用 Markdown 链接 + mention:// scheme 路由消息：
#   Agent mention:  [@显示名](mention://agent/<agent-uuid>)
#   Member mention: [@人名](mention://member/<member-uuid>)
#   Issue mention:  [MUL-123](mention://issue/<issue-uuid>)
# 纯文本 @agent-name 不会被 multica 路由，必须使用上述格式。
# ================================

