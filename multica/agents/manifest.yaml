# 工作流状态机
workflow:
  issue_states: [open, researching, drafting, reviewing, approved, committed, closed]
  transitions:
    - from: open
      to: researching
      actor: researcher      # 4828ea52-91fe-4422-b101-b3504d28b82c
    - from: researching
      to: drafting
      actor: author-draft    # a054c330-d1a7-445c-b9da-94b8564970b2
    - from: drafting
      to: reviewing
      actor: reviewer        # 6586d624-bd24-4af2-884c-2ce54705555c
    - from: reviewing
      to: approved
      actor: reviewer        # 6586d624-bd24-4af2-884c-2ce54705555c
      note: "通过审核，转移至主编终审（outcome: pass）"
    - from: reviewing
      to: drafting
      actor: reviewer        # 6586d624-bd24-4af2-884c-2ce54705555c
      note: "审核不通过，退回作者修订（outcome: fail 附修订清单）"
    - from: approved
      to: committed
      actor: editor-chief    # 7ba899bd-9e47-43d6-8f82-9940839f157c
      note: "最终确认，准备 Git 提交"
    - from: approved
      to: reviewing
      actor: editor-chief    # 7ba899bd-9e47-43d6-8f82-9940839f157c
      note: "主编反驳，需要重审"
    - from: committed
      to: closed
      actor: editor-chief    # 7ba899bd-9e47-43d6-8f82-9940839f157c

# ===== Mention 语法速查 =====
# multica 使用 Markdown link + mention:// scheme 路由，纯文本 @ 不生效
#
# ===== Mention 尾行路由规范（v0.2 新增）=====
# 评论中 mention 必须放在最后一行，独立成行。一条评论只触发一个 Agent。
# 需要触发多个 Agent 时，发多条评论。
# 详见 process/artifact-handoff.md「Mention 路由规范」章节。
#
# ===== 即产即推规范（v0.2 新增）=====
# Agent 每次修改仓库文件后必须立即 git add → commit → push。
# 不存在「先写完再一次性提交」。commit 是「修改已落盘」的唯一证据。
# 详见 process/artifact-handoff.md「即产即推规则」章节。
#
# ===== Mention 尾行路由规范（v0.2 新增）=====
# 评论中 mention 必须放在最后一行，独立成行。一条评论只触发一个 Agent。
# 需要触发多个 Agent 时，发多条评论。
# 详见 process/artifact-handoff.md「Mention 路由规范」章节。
#
