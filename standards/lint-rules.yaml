# Lint 规则配置 — 机器可解析版本
# 人类可读说明见: lint-rules-guide.md
# 被引用于: multica/skills/lint-check.md

version: "0.2"
created: "2026-04-18"

rules:
  # ========== 文风检查 ==========
  style:
    sentence-length:
      description: "单句不超过30字（短句优先）"
      threshold: 30
      severity: warning
      message: "句子过长（{length}字），建议拆分为短句"

    no-empty-phrases:
      description: "禁止空洞表达"
      patterns:
        - "非常重要"
        - "十分关键"
        - "极其重要"
        - "必不可少"
        - "不可或缺"
      severity: warning
      message: "避免空洞表达，请用具体描述替代"

    humor-meter:
      description: "幽默度适中检测"
      target: moderate  # low | moderate | high
      indicators_high:
        - "过多使用比喻"
        - "连续幽默表达"
        - "幽默与主题无关"
      indicators_low:
        - "全文无幽默元素"
        - "过于严肃枯燥"
      severity: info
      message: "幽默度检测：{level}"

    no-redundancy:
      description: "消除重复内容"
      checks:
        - "同一概念重复解释"
        - "相似段落重复出现"
        - "checklist重复条目"
      severity: warning
      message: "发现重复内容，建议合并或删除"

  # ========== 术语检查 ==========
  terminology:
    term-consistency:
      description: "术语使用必须与术语表一致"
      glossary: "standards/term-glossary.md"
      checks:
        - "术语名称一致性"
        - "定义引用一致性"
        - "别名使用规范"
      severity: error
      message: "术语 '{term}' 使用不一致，术语表定义为 '{definition}'"

    term-defined:
      description: "新术语首次出现必须定义"
      checks:
        - "新术语首次出现位置"
        - "是否有定义段落"
        - "定义是否清晰"
      severity: error
      message: "术语 '{term}' 首次出现但未定义"

    no-tech-jargon:
      description: "避免未解释的技术术语"
      glossary: "standards/term-glossary.md"
      checks:
        - "技术术语是否在术语表"
        - "是否有类比解释"
        - "是否适合产品经理理解"
      severity: warning
      message: "技术术语 '{term}' 未在术语表中，建议添加定义"

  # ========== 结构检查 ==========
  structure:
    chapter-pacing:
      description: "章节节奏公式——五段结构字数预算检查"
      sections:
        1:
          name: "痛点场景"
          target_words: 300
          tolerance_pct: 30
          maps_to: "①问题定义 + ②业务场景"
        2:
          name: "核心概念"
          target_words: 800
          tolerance_pct: 20
          maps_to: "③概念解释 + ④PM误解"
        3:
          name: "开发怎么看"
          target_words: 400
          tolerance_pct: 25
          maps_to: "⑤开发视角"
        4:
          name: "怎么做"
          target_words: 600
          tolerance_pct: 25
          maps_to: "⑥PM行动 + ⑦AI辅助 + ⑧Checklist"
        5:
          name: "一句话总结"
          target_words: 50
          tolerance_pct: 50
          maps_to: "⑨案例复盘要点 + ⑩总结"
      total_words:
        min: 2500
        max: 3000
      severity: warning
      message: "章节节奏偏离：{section}段目标{target}字，实际{actual}字"

    info-increment:
      description: "信息增量契约——So What 测试"
      rules:
        - "每段必须有明确的信息增量"
        - "相邻段落不得讲同一件事"
        - "案例复盘不重述故事，只提炼新洞察"
        - "总结不复述全文，只给公式或记忆点"
        - "相邻两段可合并且不损失信息时，必须合并"
      severity: warning
      message: "段落未通过 So What 测试：{paragraph}无明确信息增量"

    chapter-structure:
      description: "章节必须包含10要素"
      elements:
        1: "本章要解决什么问题"
        2: "真实业务场景开场"
        3: "核心概念解释"
        4: "为什么产品经理容易误解"
        5: "开发视角如何看这个问题"
        6: "产品经理应该如何做"
        7: "AI可以如何辅助"
        8: "本章 checklist"
        9: "案例复盘"
        10: "本章总结"
      severity: error
      message: "章节结构不完整，缺失要素：{missing_elements}"

    cross-reference:
      description: "章节间引用必须一致"
      checks:
        - "引用章节是否存在"
        - "引用位置是否准确"
        - "引用内容是否匹配"
      severity: warning
      message: "引用 '{reference}' 不一致或不存在"

    case-complete:
      description: "案例完整性检查"
      must_have:
        - "案例人物"
        - "案例场景"
        - "案例冲突"
        - "复盘要点"
      severity: warning
      message: "案例不完整，缺失：{missing}"

# ========== 执行配置 ==========
execution:
  run_on:
    - chapter_draft_complete
    - chapter_review
    - before_git_commit
  output:
    format: markdown
    location: "manuscript/reviews/"
